name: Update GOJ (e-Stat)
on:
  workflow_dispatch:
  schedule:
    - cron: '0 21 * * 5'  # 毎週土曜 JST 06:00（UTC 金曜 21:00）
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 政府統計（e-Stat本体API）データ更新
      - name: Update_goj
        run: node update_goj.js
        env:
          ESTAT_APPID: ${{ secrets.ESTAT_APPID }}

      # 毎月勤労統計（e-Statファイル配信CSV）データ更新。
      # ※ update_goj.js が _catalog.csv を再生成した後に実行し、kinro 3系列を追記する。
      - name: Update_kinro
        run: node update_kinro.js

      # コミット＆プッシュ
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/goj/*.csv
          git diff --cached --name-only
          git commit -m "Update GOJ $(date +'%Y-%m-%d')" || exit 0
          git push
